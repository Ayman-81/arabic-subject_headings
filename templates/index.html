<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام البحث عن رؤوس الموضوعات</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        .header { text-align: center; color: white; margin-bottom: 40px; }
        .header h1 { font-size: 2.5em; margin-bottom: 10px; }
        .header p { font-size: 1.1em; opacity: 0.9; }
        .search-box { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); margin-bottom: 30px; }
        .search-container { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .search-input { flex: 1; min-width: 200px; padding: 12px 15px; border: 2px solid #667eea; border-radius: 8px; font-size: 1em; }
        .search-input:focus { outline: none; border-color: #764ba2; box-shadow: 0 0 10px rgba(102, 126, 234, 0.5); }
        .search-button { padding: 12px 30px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 1em; font-weight: bold; }
        .search-button:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4); }
        .results-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .result-card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .result-card:hover { transform: translateY(-5px); box-shadow: 0 10px 25px rgba(0,0,0,0.15); }
        .result-card h3 { color: #667eea; margin-bottom: 10px; font-size: 1.3em; }
        .result-card p { color: #666; line-height: 1.6; margin-bottom: 10px; }
        .badge { display: inline-block; background: #667eea; color: white; padding: 5px 10px; border-radius: 20px; font-size: 0.8em; margin: 5px 5px 0 0; }
        .no-results { text-align: center; color: white; font-size: 1.2em; padding: 40px; background: rgba(255,255,255,0.1); border-radius: 10px; }
        .footer { text-align: center; color: white; margin-top: 40px; opacity: 0.8; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔍 نظام البحث عن رؤوس الموضوعات</h1>
            <p>Arabic Subject Headings Search System</p>
        </div>

        <div class="search-box">
            <div class="search-container">
                <input type="text" id="searchInput" class="search-input" placeholder="ابحث عن موضوع..." onkeypress="if(event.key === 'Enter') search()"/>
                <button class="search-button" onclick="search()">🔍 بحث</button>
            </div>
        </div>

        <div id="resultsContainer"></div>
    </div>

    <div class="footer">
        <p>© 2024 نظام البحث عن رؤوس الموضوعات</p>
    </div>

    <script>
        async function search() {
            const query = document.getElementById('searchInput').value.trim();
            if (!query) {
                showNoResults('الرجاء إدخال كلمة للبحث');
                return;
            }

            try {
                const response = await fetch(`/api/search?q=${encodeURIComponent(query)}`);
                const data = await response.json();
                displayResults(data.results || []);
            } catch (error) {
                showNoResults('حدث خطأ في البحث');
                console.error(error);
            }
        }

        function displayResults(results) {
            const container = document.getElementById('resultsContainer');
            if (!results || results.length === 0) {
                showNoResults('لم يتم العثور على نتائج');
                return;
            }

            container.innerHTML = '';
            container.className = 'results-container';
            
            results.forEach(subject => {
                const card = document.createElement('div');
                card.className = 'result-card';
                card.innerHTML = `
                    <h3>${subject.title_ar}</h3>
                    ${subject.title_en ? `<p><strong>EN:</strong> ${subject.title_en}</p>` : ''}
                    ${subject.description ? `<p>${subject.description}</p>` : ''}
                    ${subject.source ? `<span class="badge">📚 ${subject.source.name_ar}</span>` : ''}
                    ${subject.category ? `<span class="badge">🏷️ ${subject.category.name_ar}</span>` : ''}
                `;
                container.appendChild(card);
            });
        }

        function showNoResults(message) {
            const container = document.getElementById('resultsContainer');
            container.className = '';
            container.innerHTML = `<div class="no-results" style="grid-column: 1 / -1;"><p>😕 ${message}</p></div>`;
        }

        window.onload = () => showNoResults('ابدأ البحث عن رؤوس الموضوعات');
    </script>
</body>
</html>
